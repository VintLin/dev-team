name: CI Smoke
on:
  pull_request:
  push:
    branches: [main]
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check API server syntax
        run: node --check apps/api/src/server.js
      - name: Check web app syntax
        run: node --check apps/web/src/app.js
